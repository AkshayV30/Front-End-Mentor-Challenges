<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Contact form</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./res/style.css" />
  </head>
  <body>
    <!-- Success Alert (Injected/controlled by JS) -->
    <div id="toast" role="alert" aria-live="polite">
      <strong>Success!</strong> Thanks for completing the form. We'll be in
      touch soon.
    </div>

    <main class="container">
      <h1>Contact Us</h1>

      <form id="contactForm" novalidate>
        <div class="row">
          <div class="form-group">
            <label for="firstName">First Name *</label>
            <input id="firstName" />
            <small class="error"></small>
          </div>

          <div class="form-group">
            <label for="lastName">Last Name *</label>
            <input id="lastName" />
            <small class="error"></small>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input id="email" />
          <small class="error"></small>
        </div>

        <fieldset class="form-group">
          <legend>Query Type *</legend>
          <div class="row query-type">
            <label class="radio">
              <input type="radio" name="query" value="general" />
              General Enquiry
            </label>
            <label class="radio">
              <input type="radio" name="query" value="support" />
              Support Request
            </label>
          </div>
          <small class="error"></small>
        </fieldset>

        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="message"></textarea>
          <small class="error"></small>
        </div>

        <div class="form-group checkbox">
          <label>
            <input type="checkbox" id="consent" />
            I consent to being contacted by the team *
          </label>
          <small class="error"></small>
        </div>

        <button type="submit">Submit</button>
      </form>
    </main>

    <footer>
      <p class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io">Frontend Mentor</a>. Coded by
        <a href="#">AkshayV30</a>.
      </p>
    </footer>

    <script src="./res/script.js"></script>
  </body>
</html>
