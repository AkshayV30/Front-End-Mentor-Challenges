<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./res/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Interactive card details form</title>
    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./res/css/main.css" />
  </head>
  <body>
    <main class="app bg-hero">
      <section class="app__preview">
        <!-- Front Card -->
        <article class="card card--front">
          <img
            src="./res/images/card-logo.svg"
            alt="Card logo"
            class="card__logo"
          />

          <p class="card__number" id="preview-number">0000 0000 0000 0000</p>

          <div class="card__meta">
            <span id="preview-name">Jane Appleseed</span>
            <span id="preview-exp">00/00</span>
          </div>
        </article>

        <!-- Back Card -->
        <article class="card card--back">
          <span class="card__cvc" id="preview-cvc">000</span>
        </article>
      </section>

      <!-- =========================
           FORM STATE
      ========================== -->
      <section class="app__form form" id="form-section">
        <form class="form__wrapper" id="card-form" novalidate>
          <!-- Name -->
          <div class="form__group">
            <label class="form__label" for="cardHolderName"
              >Cardholder Name</label
            >
            <input
              class="form__input"
              id="cardHolderName"
              name="cardHolderName"
              type="text"
              placeholder="e.g. Jane Appleseed"
              aria-describedby="name-error"
            />
            <small class="form__error" id="name-error" role="alert"></small>
          </div>

          <!-- Card Number -->
          <div class="form__group">
            <label class="form__label" for="cardNumber">Card Number</label>
            <input
              class="form__input"
              id="cardNumber"
              name="cardNumber"
              type="text"
              placeholder="e.g. 1234 5678 9123 0000"
              maxlength="19"
              aria-describedby="number-error"
            />
            <small class="form__error" id="number-error" role="alert"></small>
          </div>

          <!-- Expiry + CVC -->
          <div class="form__row">
            <!-- Expiry -->
            <div class="form__group" data-group="expiry">
              <label class="form__label">Exp. Date (MM / YY)</label>

              <div class="expiry form__row">
                <input
                  class="form__input"
                  id="expMonth"
                  type="text"
                  inputmode="numeric"
                  maxlength="2"
                  placeholder="MM"
                  aria-describedby="exp-error"
                />

                <input
                  class="form__input"
                  id="expYear"
                  type="text"
                  inputmode="numeric"
                  maxlength="2"
                  placeholder="YY"
                  aria-describedby="exp-error"
                />
              </div>

              <small class="form__error" id="exp-error" role="alert"></small>
            </div>

            <!-- CVC -->
            <div class="form__group">
              <label class="form__label" for="cvc">CVC</label>
              <input
                class="form__input"
                id="cvc"
                type="text"
                inputmode="numeric"
                maxlength="3"
                placeholder="000"
                aria-describedby="cvc-error"
              />
              <small class="form__error" id="cvc-error" role="alert"></small>
            </div>
          </div>

          <button type="submit" class="button button--primary">Confirm</button>
        </form>
      </section>

      <!-- THANK YOU STATE -->
      <section class="app__modal modal" id="thank-you-section" hidden>
        <img src="./res/images/icon-complete.svg" alt="Completed check mark" />
        <h2>Thank You!</h2>
        <p>We’ve added your card details.</p>
        <button id="continue-btn" class="button button--primary">
          Continue
        </button>
      </section>
    </main>

    <footer>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io" target="_blank">
          Frontend Mentor </a
        >. Coded by Akshay V30.
      </div>
    </footer>

    <script src="./res/js/script.js"></script>
  </body>
</html>
