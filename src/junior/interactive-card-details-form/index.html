<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./res/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Interactive card details form</title>
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./res/css/main.css" />
  </head>
  <body>
    <main class="layout-main bg-hero">
      <!--  CARD PREVIEW SECTION   -->
      <div class="card-preview">
        <!-- Front Card -->
        <section class="card-front card">
          <img
            src="./res/images/card-logo.svg"
            alt="Card logo"
            id="card-logo"
          />

          <p id="preview-number">0000 0000 0000 0000</p>

          <div class="card-meta">
            <span id="preview-name">Jane Appleseed</span>
            <span id="preview-exp">00/00</span>
          </div>
        </section>

        <!-- Back Card -->
        <section class="card-back card">
          <span id="preview-cvc">000</span>
        </section>
      </div>

      <!-- =========================
           FORM STATE
      ========================== -->
      <section id="form-section" class="form-container">
        <form id="card-form" novalidate>
          <!-- Name -->
          <div class="form-group">
            <label for="cardHolderName">Cardholder Name</label>
            <input
              type="text"
              `
              id="cardHolderName"
              name="cardHolderName"
              placeholder="e.g. Jane Appleseed"
              aria-describedby="name-error"
            />
            <small id="name-error" class="error-msg" role="alert"></small>
          </div>

          <!-- Card Number -->
          <div class="form-group">
            <label for="cardNumber">Card Number</label>
            <input
              type="text"
              id="cardNumber"
              name="cardNumber"
              placeholder="e.g. 1234 5678 9123 0000"
              maxlength="19"
              aria-describedby="number-error"
            />
            <small id="number-error" class="error-msg" role="alert"></small>
          </div>

          <!-- Expiry + CVC -->
          <div class="form-row">
            <!-- Expiry -->
            <div class="form-group" data-group="expiry">
              <label>Exp. Date (MM / YY)</label>

              <div class="expiry">
                <input
                  type="text"
                  inputmode="numeric"
                  id="expMonth"
                  maxlength="2"
                  placeholder="MM"
                  aria-describedby="exp-error"
                />

                <input
                  type="text"
                  inputmode="numeric"
                  id="expYear"
                  maxlength="2"
                  placeholder="YY"
                  aria-describedby="exp-error"
                />
              </div>

              <small id="exp-error" class="error-msg" role="alert"></small>
            </div>

            <!-- CVC -->
            <div class="form-group">
              <label for="cvc">CVC</label>
              <input
                type="text"
                inputmode="numeric"
                maxlength="3"
                id="cvc"
                placeholder="000"
                aria-describedby="cvc-error"
              />
              <small id="cvc-error" class="error-msg" role="alert"></small>
            </div>
          </div>

          <button type="submit" class="btn">Confirm</button>
        </form>
      </section>

      <!-- THANK YOU STATE -->
      <section id="thank-you-section" class="thank-container" hidden>
        <img src="./res/images/icon-complete.svg" alt="Completed check mark" />
        <h2>Thank You!</h2>
        <p>We’ve added your card details.</p>
        <button id="continue-btn" class="btn">Continue</button>
      </section>
    </main>

    <footer>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io" target="_blank">
          Frontend Mentor </a
        >. Coded by Akshay V30.
      </div>
    </footer>

    <script src="./res/js/script.js"></script>
  </body>
</html>
