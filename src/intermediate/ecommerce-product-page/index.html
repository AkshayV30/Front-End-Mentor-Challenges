<!doctype html>
<html lang="en">
  <head>
    <!-- displays site properly based on user's device -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Frontend Mentor | E-commerce product page</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./res/assets/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./res/css/styles.css" />
  </head>

  <body class="l-body">
    <header class="l-header l-container u-flex u-flex-between">
      <nav class="l-nav u-flex">
        <img
          class="c-logo"
          id="logo"
          src="./res/assets/logo.svg"
          alt=" sneakers-logo"
        />
        <ul class="l-nav__item-list u-flex u-flex-gap-xl">
          <li class="c-nav__item"><a href="#">Collections</a></li>
          <li class="c-nav__item"><a href="#">Men</a></li>
          <li class="c-nav__item"><a href="#">Women</a></li>
          <li class="c-nav__item"><a href="#">About</a></li>
          <li class="c-nav__item"><a href="#">Contact</a></li>
        </ul>
      </nav>

      <div class="u-flex u-flex-align">
        <div class="u-flex u-position-relative">
          <img
            class="c-cart-icon"
            id="icon-cart-main"
            src="./res/assets/icons/icon-cart.svg"
            alt="icon cart"
          />
          <p id="c-cart-icon-badge" class="c-cart-icon-badge is-hidden">0</p>
        </div>
        <img
          class="c-avatar"
          src="./res/assets/avatars/image-avatar.png"
          alt="avatar"
        />
      </div>
      <div class="l-cart u-position-absolute">
        <h4 class="c-cart__title">Cart</h4>
        <div
          class="c-cart__content u-flex u-flex-col u-flex-align u-flex-between"
        ></div>
      </div>
    </header>

    <main>
      <div class="">
        <div id="gallery-item" class="gallery-item"></div>
      </div>

      <div class="">
        <div id="product-info" class=""></div>

        <audio
          id="alertSound"
          src="./res/assets/audio/wrong-answer-126515.mp3"
        ></audio>

        <div class="">
          <button class="btn-add-sub" type="button">
            <img
              id="icon-minus"
              src="./res/assets/icons/icon-minus.svg"
              alt="minus symbol"
            />
          </button>
          <span id="count">0</span>
          <button>
            <img
              id="icon-plus"
              src="./res/assets/icons/icon-plus.svg"
              alt="plus symbol"
            />
          </button>
          <div>
            <button class="btn-cart" type="button">
              <img
                id="icon-cart"
                src="./res/assets/icons/icon-cart.svg"
                alt=""
              />
            </button>
            <span>Add to cart</span>
          </div>
        </div>
      </div>

      <div class="lightbox-modal hidden"></div>
    </main>

    <footer>
      <div class="attribution">
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by <a href="#">Akshayv30</a>.
      </div>
    </footer>
    <script defer type="module" src="./res/js/app.js"></script>
  </body>
</html>
