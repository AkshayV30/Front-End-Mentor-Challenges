<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Rock, Paper, Scissors</title>
  </head>
  <body>
    <div class="header">
      <div class="title">
        ROCK <br />
        PAPER <br />
        SCISSORS
      </div>
      <div class="score-box">
        <p>SCORE</p>
        <div class="score" id="score">0</div>
      </div>
    </div>

    <div class="game" id="game">
      <button class="choice rock" onclick="play('rock')">✊</button>
      <button class="choice paper" onclick="play('paper')">✋</button>
      <button class="choice scissors" onclick="play('scissors')">✌</button>
    </div>

    <div class="result" id="result">
      <p>You picked: <span id="userPick"></span></p>
      <p>House picked: <span id="housePick"></span></p>
      <h2 id="resultText"></h2>
      <button class="play-again" onclick="resetGame()">Play Again</button>
    </div>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>

    <script src="./scripts.js"></script>
  </body>
</html>
